# .github/workflows/ai-safe2-make-gate.yml
# AI SAFE2 v3.0 CI/CD Gate — Make.com Sovereign Runtime
# Cyber Strategy Institute

name: AI SAFE2 Make.com Sovereign Gate

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'examples/make-sovereign-runtime/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'examples/make-sovereign-runtime/**'
  workflow_dispatch:

env:
  PYTHONPATH: examples/make-sovereign-runtime/enforcement

jobs:
  smoke-test:
    name: AI SAFE2 Smoke Test (21/21 Required)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify stdlib-only enforcement
        working-directory: examples/make-sovereign-runtime
        run: |
          python3 -c "
          import ast, pathlib, sys
          STDLIB   = sys.stdlib_module_names
          INTERNAL = {'ai_safe2_engine', 'sovereign_make'}
          ok = True
          for f in pathlib.Path('enforcement').glob('*.py'):
              tree = ast.parse(f.read_text())
              for node in ast.walk(tree):
                  if isinstance(node, ast.Import):
                      for alias in node.names:
                          base = alias.name.split('.')[0]
                          if base not in STDLIB and base not in INTERNAL:
                              print(f'EXTERNAL: {f.name}: {alias.name}'); ok = False
                  elif isinstance(node, ast.ImportFrom):
                      mod = (node.module or '').split('.')[0]
                      if mod and mod not in STDLIB and mod not in INTERNAL and mod != '__future__':
                          print(f'EXTERNAL: {f.name}: from {node.module}'); ok = False
          print('OK: stdlib-only' if ok else 'FAIL: external deps found')
          if not ok: sys.exit(1)
          "

      - name: Run 21/21 smoke test
        working-directory: examples/make-sovereign-runtime
        run: python3 smoke_test.py

      - name: Run scenario simulation
        working-directory: examples/make-sovereign-runtime
        run: python3 examples/make_webhook_scenario.py

  scan-knowledge-files:
    name: Scan Knowledge File Additions
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scan changed knowledge files
        working-directory: examples/make-sovereign-runtime
        run: |
          git fetch origin ${{ github.base_ref }}
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }} HEAD | \
                    grep -E '\.(txt|pdf|docx|csv|md|json)$' | \
                    grep -v 'enforcement/' | grep -v 'smoke_test' || true)
          if [ -z "$CHANGED" ]; then
            echo "No knowledge files changed."
            exit 0
          fi
          python3 - << 'PYEOF'
          import sys, pathlib
          sys.path.insert(0, 'enforcement')
          from sovereign_make import MakeSovereignRuntime
          guard = MakeSovereignRuntime()
          failed = []
          import subprocess
          changed = subprocess.check_output(
              ['git', 'diff', '--name-only', 'origin/${{ github.base_ref }}', 'HEAD'],
              text=True
          ).strip().split('\n')
          for rel in changed:
              if not any(rel.endswith(ext) for ext in ['.txt','.pdf','.docx','.csv','.md','.json']):
                  continue
              if 'enforcement/' in rel or 'smoke_test' in rel:
                  continue
              p = pathlib.Path('../../' + rel)
              if not p.exists():
                  continue
              try:
                  guard.scan_knowledge_file(p.read_text(errors='replace'), p.name)
                  print(f'[OK] {rel}')
              except ValueError as e:
                  print(f'[BLOCKED] {rel}: {e}')
                  failed.append(rel)
          if failed:
              print(f'::error::Knowledge files BLOCKED: {failed}')
              sys.exit(1)
          PYEOF

  love-equation-gate:
    name: Love Equation Gate (GREEN Required)
    runs-on: ubuntu-latest
    needs: [smoke-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Assert GREEN band
        working-directory: examples/make-sovereign-runtime
        run: |
          python3 - << 'EOF'
          import sys
          sys.path.insert(0, 'enforcement')
          from sovereign_make import MakeSovereignRuntime
          guard = MakeSovereignRuntime()
          status = guard.get_status()
          band  = status['alignment_band']
          score = status['love_score']
          print(f'Love Score: {score} | Band: {band}')
          if band != 'GREEN':
              print('::error::Band not GREEN. Make scenario deployment blocked.')
              sys.exit(1)
          print('AI SAFE2 Make gate: GREEN — cleared.')
          EOF
