# SPIRE Server configuration -- NEXUS Development Mode
# Trust domain matches NEXUS_TRUST_DOMAIN in docker/.env
#
# PRODUCTION: replace this with your enterprise SPIRE deployment.
# This config uses an in-memory CA and disk-based data store.
# It is NOT suitable for production use.
#
# Reference: https://spiffe.io/docs/latest/deploying/spire_server/

server {
    bind_address = "0.0.0.0"
    bind_port = "8081"
    trust_domain = "nexus.local"
    data_dir = "/run/spire/data"
    log_level = "WARN"
    log_format = "json"

    # Registration API: agents register their SVID requests here
    registration_uds_path = "/tmp/spire-server/private/api.sock"

    # Default SVID TTL: 1 hour (production should use 24h max per NEXUS L1.3)
    default_svid_ttl = "1h"

    # CA TTL: 24 hours for dev; use offline CA in production
    ca_ttl = "24h"

    # Key type: EC P-256 for dev; use ML-DSA-65 for NEXUS-Full/PQC
    ca_key_type = "ec-p256"

    # JWT SVID issuer
    jwt_issuer = "https://spire.nexus.local"
}

plugins {
    DataStore "sql" {
        plugin_data {
            database_type = "sqlite3"
            connection_string = "/run/spire/data/datastore.sqlite3"
        }
    }

    KeyManager "disk" {
        plugin_data {
            keys_path = "/run/spire/data/keys.json"
        }
    }

    NodeAttestor "join_token" {
        plugin_data {}
    }
}

health_checks {
    listener_enabled = true
    bind_address = "0.0.0.0"
    bind_port = "8080"
    live_path = "/live"
    ready_path = "/ready"
}
