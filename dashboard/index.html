<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SAFE² Framework v2.1 | GRC Taxonomy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --p1: #D1E015;
            --p2: #2AC918;
            --p3: #20D9CC;
            --p4: #4E52A6;
            --p5: #DD1ACC;
            --csi-orange: #f6921e;
            --csi-maroon: #820f1a;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #030712;
            color: #f1f5f9;
            margin: 0;
            padding: 0;
        }
        .dashboard-grid {
            background-image:
                linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #030712; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
        .glass-panel {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin {
            animation: spin 1s linear infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
        .animate-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        .control-card {
            transition: all 0.2s ease;
        }
        .control-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            background: #0f172a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1rem;
            padding: 2rem;
        }
        
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="antialiased overflow-x-hidden">
    <div id="root">
        <div class="flex items-center justify-center h-screen bg-[#030712] text-slate-500 font-mono text-xs uppercase tracking-widest">
            <div class="flex flex-col items-center gap-4">
                <svg class="animate-spin text-orange-500" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
                </svg>
                <p class="animate-pulse">Synchronizing with AI SAFE² Repository...</p>
            </div>
        </div>
    </div>

    <!-- Modal for control details -->
    <div id="controlModal" class="modal">
        <div class="modal-content custom-scrollbar">
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // Configuration
        const GITHUB_REPO_URL = "https://raw.githubusercontent.com/CyberStrategyInstitute/ai-safe2-framework/main/dashboard/public/data/controls.json";
        const LOCAL_FALLBACK_URL = "./public/data/controls.json";
        
        const PILLAR_COLORS = {
            "Sanitize & Isolate": "#D1E015",
            "Audit & Inventory": "#2AC918",
            "Fail-Safe & Recovery": "#20D9CC",
            "Engage & Monitor": "#4E52A6",
            "Evolve & Educate": "#DD1ACC"
        };

        const PILLARS = Object.keys(PILLAR_COLORS);

        // State
        let allControls = [];
        let filters = {
            pillar: 'All',
            riskLevel: 'All',
            isGapFiller: null,
            searchQuery: ''
        };
        let dataSource = 'loading';

        // Icons as SVG
        const icons = {
            search: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>',
            shield: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>',
            external: '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>',
            activity: '<svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>',
            refresh: '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/></svg>',
            x: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
            briefcase: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>'
        };

        // Load data
        async function loadData() {
            try {
                // Try GitHub first
                const response = await fetch(GITHUB_REPO_URL, { cache: 'no-cache' });
                if (!response.ok) throw new Error('Remote source unavailable');
                const data = await response.json();
                allControls = data;
                dataSource = 'remote';
                console.log(`✅ Loaded ${data.length} controls from GitHub`);
            } catch (err) {
                console.warn("GitHub fetch failed, falling back to local:", err);
                try {
                    // Fallback to local
                    const localResponse = await fetch(LOCAL_FALLBACK_URL);
                    if (!localResponse.ok) throw new Error('Local fallback failed');
                    const localData = await localResponse.json();
                    allControls = localData;
                    dataSource = 'local';
                    console.log(`✅ Loaded ${localData.length} controls from local`);
                } catch (localErr) {
                    console.error("Both sources failed:", localErr);
                    showError("Critical Error: Unable to load framework data from any source.");
                    return;
                }
            }
            render();
        }

        // Filter controls
        function getFilteredControls() {
            return allControls.filter(c => {
                const matchPillar = filters.pillar === 'All' || c.pillar === filters.pillar;
                const matchRisk = filters.riskLevel === 'All' || c.risk_level === filters.riskLevel;
                const matchGap = filters.isGapFiller === null || c.is_gap_filler === filters.isGapFiller;
                const matchSearch = 
                    c.name.toLowerCase().includes(filters.searchQuery.toLowerCase()) ||
                    c.description.toLowerCase().includes(filters.searchQuery.toLowerCase()) ||
                    c.id.toLowerCase().includes(filters.searchQuery.toLowerCase()) ||
                    (c.sub_topic && c.sub_topic.toLowerCase().includes(filters.searchQuery.toLowerCase())) ||
                    (c.decision_maker_impact && c.decision_maker_impact.toLowerCase().includes(filters.searchQuery.toLowerCase()));
                return matchPillar && matchRisk && matchGap && matchSearch;
            });
        }

        // Calculate stats
        function getStats() {
            const total = allControls.length;
            const critical = allControls.filter(c => c.risk_level === 'Critical').length;
            const gaps = allControls.filter(c => c.is_gap_filler).length;
            const pillarsCount = new Set(allControls.map(c => c.pillar)).size;
            return { total, critical, gaps, pillarsCount };
        }

        // Group controls by pillar
        function groupByPillar(controls) {
            const groups = {};
            controls.forEach(c => {
                if (!groups[c.pillar]) groups[c.pillar] = [];
                groups[c.pillar].push(c);
            });
            return groups;
        }

        // Render risk badge
        function getRiskBadge(level) {
            const colors = {
                'Critical': 'bg-red-500/10 text-red-500 border-red-500/20',
                'High': 'bg-orange-500/10 text-orange-500 border-orange-500/20',
                'Medium': 'bg-yellow-500/10 text-yellow-500 border-yellow-500/20',
                'Low': 'bg-green-500/10 text-green-500 border-green-500/20'
            };
            return `<span class="px-2 py-0.5 rounded text-[10px] font-black uppercase tracking-widest border ${colors[level] || colors['Low']}">${level}</span>`;
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Render control card
        function renderControlCard(control) {
            const color = PILLAR_COLORS[control.pillar] || '#f6921e';
            const isV21 = control.sub_topic && control.sub_topic.includes('v2.1');
            
            return `
                <div class="control-card glass-panel rounded-xl p-5 cursor-pointer" onclick="openModal('${control.id}')" 
                     style="border-color: ${color}20;">
                    <div class="flex items-start justify-between mb-3">
                        <div class="flex items-center gap-2">
                            <div class="w-2 h-2 rounded-full" style="background-color: ${color};"></div>
                            <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest mono">${escapeHtml(control.id)}</span>
                        </div>
                        ${getRiskBadge(control.risk_level)}
                    </div>
                    
                    <h3 class="text-sm font-bold text-white mb-2 leading-tight">${escapeHtml(control.name)}</h3>
                    
                    ${control.sub_topic ? `
                    <div class="mb-2">
                        <span class="text-[9px] font-bold px-2 py-0.5 rounded ${isV21 ? 'bg-cyan-500/10 text-cyan-400 border border-cyan-500/20' : 'bg-slate-700/30 text-slate-400'}">${escapeHtml(control.sub_topic)}</span>
                    </div>` : ''}
                    
                    <p class="text-xs text-slate-400 leading-relaxed line-clamp-3 mb-3">${escapeHtml(control.description)}</p>
                    
                    ${control.decision_maker_impact ? `
                    <div class="flex items-start gap-2 mt-3 pt-3 border-t border-white/5">
                        ${icons.briefcase}
                        <p class="text-[10px] text-slate-500 leading-relaxed line-clamp-2 italic">${escapeHtml(control.decision_maker_impact)}</p>
                    </div>` : ''}
                    
                    <div class="flex items-center gap-2 mt-3">
                        ${control.is_gap_filler ? '<div class="px-2 py-1 bg-purple-500/10 border border-purple-500/20 rounded text-[9px] font-bold text-purple-400 uppercase tracking-widest">Gap Filler</div>' : ''}
                        ${isV21 ? '<div class="px-2 py-1 bg-cyan-500/10 border border-cyan-500/20 rounded text-[9px] font-bold text-cyan-400 uppercase tracking-widest">v2.1</div>' : ''}
                    </div>
                </div>
            `;
        }

        // Open modal
        function openModal(controlId) {
            const control = allControls.find(c => c.id === controlId);
            if (!control) return;

            const color = PILLAR_COLORS[control.pillar] || '#f6921e';
            const modalBody = document.getElementById('modalBody');
            
            modalBody.innerHTML = `
                <div class="flex items-start justify-between mb-6">
                    <div class="flex-1">
                        <div class="flex items-center gap-3 mb-2 flex-wrap">
                            <div class="w-3 h-3 rounded-full" style="background-color: ${color};"></div>
                            <span class="text-xs font-black text-slate-500 uppercase tracking-widest mono">${escapeHtml(control.id)}</span>
                            ${getRiskBadge(control.risk_level)}
                            ${control.is_gap_filler ? '<span class="px-2 py-1 bg-purple-500/10 border border-purple-500/20 rounded text-[9px] font-bold text-purple-400 uppercase tracking-widest">Gap Filler</span>' : ''}
                        </div>
                        <h2 class="text-2xl font-bold text-white mb-2">${escapeHtml(control.name)}</h2>
                        <p class="text-sm text-slate-400">${escapeHtml(control.pillar)}</p>
                        ${control.sub_topic ? `<p class="text-xs text-slate-500 mt-1">📂 ${escapeHtml(control.sub_topic)}</p>` : ''}
                    </div>
                    <button onclick="closeModal()" class="p-2 hover:bg-white/5 rounded transition-colors flex-shrink-0">
                        ${icons.x}
                    </button>
                </div>
                
                <div class="space-y-6">
                    <div>
                        <h3 class="text-sm font-bold text-white mb-2 uppercase tracking-widest">Description</h3>
                        <p class="text-sm text-slate-300 leading-relaxed">${escapeHtml(control.description)}</p>
                    </div>
                    
                    ${control.decision_maker_impact ? `
                    <div class="bg-blue-500/5 border border-blue-500/10 rounded-lg p-4">
                        <h3 class="text-sm font-bold text-blue-400 mb-2 uppercase tracking-widest flex items-center gap-2">
                            ${icons.briefcase}
                            Decision-Maker Impact
                        </h3>
                        <p class="text-sm text-slate-300 leading-relaxed">${escapeHtml(control.decision_maker_impact)}</p>
                    </div>` : ''}
                    
                    ${control.implementation_guidance ? `
                    <div>
                        <h3 class="text-sm font-bold text-white mb-2 uppercase tracking-widest">Implementation Guidance</h3>
                        <p class="text-sm text-slate-300 leading-relaxed">${escapeHtml(control.implementation_guidance)}</p>
                    </div>` : ''}
                    
                    ${control.framework_note ? `
                    <div class="bg-amber-500/5 border border-amber-500/10 rounded-lg p-4">
                        <h3 class="text-sm font-bold text-amber-400 mb-2 uppercase tracking-widest">Framework Note</h3>
                        <p class="text-sm text-slate-300 leading-relaxed">${escapeHtml(control.framework_note)}</p>
                    </div>` : ''}
                    
                    ${control.cross_reference ? `
                    <div>
                        <h3 class="text-sm font-bold text-white mb-2 uppercase tracking-widest">Cross Reference</h3>
                        <p class="text-sm text-cyan-400 mono">${escapeHtml(control.cross_reference)}</p>
                    </div>` : ''}
                    
                    ${control.components ? `
                    <div>
                        <h3 class="text-sm font-bold text-white mb-2 uppercase tracking-widest">Components</h3>
                        <p class="text-sm text-slate-300">${escapeHtml(control.components)}</p>
                    </div>` : ''}
                    
                    ${control.related_frameworks && control.related_frameworks.length > 0 ? `
                    <div>
                        <h3 class="text-sm font-bold text-white mb-2 uppercase tracking-widest">Related Frameworks</h3>
                        <div class="flex flex-wrap gap-2">
                            ${control.related_frameworks.map(ref => `
                                <span class="px-3 py-1 bg-slate-800/50 border border-slate-700 rounded text-xs text-slate-300">${escapeHtml(ref)}</span>
                            `).join('')}
                        </div>
                    </div>` : ''}
                </div>
            `;
            
            document.getElementById('controlModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('controlModal').classList.remove('active');
        }

        // Close modal on background click
        document.getElementById('controlModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Close modal on Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        // Show error
        function showError(message) {
            document.getElementById('root').innerHTML = `
                <div class="flex flex-col items-center justify-center h-screen bg-[#030712] text-red-500 gap-4 p-8 text-center">
                    ${icons.activity}
                    <h2 class="text-xl font-bold uppercase tracking-widest">Synchronization Failed</h2>
                    <p class="text-sm font-mono max-w-md bg-red-900/10 border border-red-900/20 p-4 rounded">${escapeHtml(message)}</p>
                    <button onclick="location.reload()" class="px-6 py-2 bg-red-500 text-white rounded font-bold text-xs uppercase tracking-widest hover:bg-red-400 transition-colors">
                        Retry Sync
                    </button>
                </div>
            `;
        }

        // Main render function
        function render() {
            const stats = getStats();
            const filteredControls = getFilteredControls();
            const groupedControls = groupByPillar(filteredControls);

            document.getElementById('root').innerHTML = `
                <div class="flex flex-col min-h-screen bg-[#030712] dashboard-grid">
                    <!-- Sticky Navigation & Filter Bar -->
                    <div class="sticky top-0 z-40 bg-[#030712]/95 backdrop-blur-xl border-b border-white/5 shadow-2xl shadow-black/50">
                        <!-- Header & High-Level Counters -->
                        <header class="px-4 sm:px-8 py-4 flex flex-col sm:flex-row items-center justify-between gap-4 border-b border-white/5 bg-[#0f172a]/20">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background: linear-gradient(135deg, #f6921e 0%, #820f1a 100%);">
                                    <span class="font-black text-white text-lg">A²</span>
                                </div>
                                <div>
                                    <h1 class="text-xl font-black tracking-tight text-white">AI SAFE² Framework</h1>
                                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Security & Governance Taxonomy v2.1</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-4 sm:gap-6 flex-wrap justify-center">
                                <div class="flex items-center gap-3 border-r border-white/10 pr-4 sm:pr-6">
                                    <div class="flex flex-col items-end">
                                        <span class="text-[8px] sm:text-[9px] font-black uppercase tracking-[0.2em] ${dataSource === 'remote' ? 'text-emerald-500' : 'text-amber-500'}">
                                            ${dataSource === 'remote' ? '● REPO LIVE' : '○ LOCAL CACHE'}
                                        </span>
                                        <button onclick="location.reload()" class="text-[9px] sm:text-[10px] text-slate-500 hover:text-white transition-colors flex items-center gap-1 group">
                                            <div class="group-hover:rotate-180 transition-transform duration-500">${icons.refresh}</div>
                                            SYNC
                                        </button>
                                    </div>
                                </div>
                                <div class="bg-[#1e293b]/20 border border-white/5 rounded-md px-5 py-2.5 min-w-[100px] text-center shadow-sm">
                                    <div class="text-2xl font-black tracking-tighter text-slate-100">${stats.total}</div>
                                    <div class="text-[10px] font-extrabold text-slate-600 uppercase tracking-[0.15em]">CONTROLS</div>
                                </div>
                                <div class="bg-[#1e293b]/20 border border-white/5 rounded-md px-5 py-2.5 min-w-[100px] text-center shadow-sm">
                                    <div class="text-2xl font-black tracking-tighter text-blue-400">${stats.pillarsCount}</div>
                                    <div class="text-[10px] font-extrabold text-slate-600 uppercase tracking-[0.15em]">PILLARS</div>
                                </div>
                                <div class="bg-[#1e293b]/20 border border-white/5 rounded-md px-5 py-2.5 min-w-[100px] text-center shadow-sm">
                                    <div class="text-2xl font-black tracking-tighter text-red-500">${stats.critical}</div>
                                    <div class="text-[10px] font-extrabold text-slate-600 uppercase tracking-[0.15em]">CRITICAL</div>
                                </div>
                                <div class="bg-[#1e293b]/20 border border-white/5 rounded-md px-5 py-2.5 min-w-[100px] text-center shadow-sm">
                                    <div class="text-2xl font-black tracking-tighter text-purple-400">${stats.gaps}</div>
                                    <div class="text-[10px] font-extrabold text-slate-600 uppercase tracking-[0.15em]">GAPS</div>
                                </div>
                            </div>
                        </header>

                        <!-- Global Filter Bar -->
                        <div class="px-4 sm:px-8 py-4 flex flex-col md:flex-row gap-4 md:gap-6 items-center justify-between">
                            <div class="relative w-full md:w-[400px]">
                                <div class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500">${icons.search}</div>
                                <input type="text" id="searchInput" placeholder="Search taxonomy (e.g. Swarm, Validation, NHI)..." 
                                       class="w-full bg-[#0f172a] border border-slate-800 rounded-lg py-2 pl-10 pr-4 text-sm text-white focus:outline-none focus:border-[#f6921e]/50 transition-all placeholder:text-slate-600 shadow-inner"
                                       value="${escapeHtml(filters.searchQuery)}"
                                       oninput="updateSearch(this.value)">
                            </div>
                            <div class="flex items-center gap-2 overflow-x-auto pb-2 md:pb-0 w-full md:w-auto scrollbar-thin scrollbar-thumb-slate-800 scrollbar-track-transparent">
                                <button onclick="setPillarFilter('All')" class="px-5 py-2 rounded text-[11px] font-black transition-all border flex items-center gap-2.5 whitespace-nowrap uppercase tracking-widest ${filters.pillar === 'All' ? 'bg-[#f6921e] border-[#f6921e] text-white shadow-lg shadow-orange-900/20' : 'bg-[#1e293b]/40 border-slate-800 text-slate-500 hover:border-slate-600 hover:text-slate-300'}">
                                    All
                                </button>
                                ${PILLARS.map(p => `
                                    <button onclick="setPillarFilter('${p}')" class="px-5 py-2 rounded text-[11px] font-black transition-all border flex items-center gap-2.5 whitespace-nowrap uppercase tracking-widest ${filters.pillar === p ? 'bg-[#f6921e] border-[#f6921e] text-white shadow-lg shadow-orange-900/20' : 'bg-[#1e293b]/40 border-slate-800 text-slate-500 hover:border-slate-600 hover:text-slate-300'}">
                                        <div class="w-1.5 h-1.5 rounded-full shadow-sm" style="background-color: ${PILLAR_COLORS[p]};"></div>
                                        ${p}
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                    </div>

                    <!-- Grouped Content Sections -->
                    <main class="flex-1 p-4 sm:p-8">
                        <div class="max-w-[1500px] mx-auto space-y-16 pb-32">
                            ${Object.keys(groupedControls).length > 0 ? 
                                Object.entries(groupedControls).map(([pillarName, controls]) => `
                                    <section class="space-y-8">
                                        <div class="flex items-center gap-5 border-b border-white/5 pb-5">
                                            <div class="p-3.5 rounded-lg border flex items-center justify-center shadow-lg"
                                                 style="background-color: ${PILLAR_COLORS[pillarName]}10; border-color: ${PILLAR_COLORS[pillarName]}30; box-shadow: 0 0 20px ${PILLAR_COLORS[pillarName]}05;">
                                                <div style="color: ${PILLAR_COLORS[pillarName]};">${icons.shield}</div>
                                            </div>
                                            <div>
                                                <h2 class="text-2xl font-extrabold text-white tracking-tight">${escapeHtml(pillarName)}</h2>
                                                <p class="text-xs text-slate-500 font-bold uppercase tracking-[0.2em] mt-1 opacity-70">
                                                    ${controls.length} Controls • Primary AI SAFE² Strategic Domain
                                                </p>
                                            </div>
                                        </div>
                                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                                            ${controls.map(c => renderControlCard(c)).join('')}
                                        </div>
                                    </section>
                                `).join('') 
                                : 
                                `<div class="flex flex-col items-center justify-center py-48 glass-panel rounded-2xl border-dashed">
                                    ${icons.activity}
                                    <p class="text-slate-400 font-bold tracking-widest uppercase mt-6">No controls match your query</p>
                                    <button onclick="resetFilters()" class="mt-6 px-8 py-3 bg-[#f6921e]/10 text-[#f6921e] border border-[#f6921e]/20 rounded-full text-xs font-black hover:bg-[#f6921e] hover:text-white transition-all uppercase tracking-widest">
                                        Reset Dashboard
                                    </button>
                                </div>`
                            }
                        </div>
                    </main>

                    <footer class="fixed bottom-0 left-0 right-0 h-10 bg-[#0f172a] border-t border-white/5 px-8 flex items-center justify-between z-20">
                        <div class="flex items-center gap-4 text-[10px] text-slate-500 font-bold uppercase tracking-widest">
                            <span>Source: Cyber Strategy Institute | AI SAFE² Framework v2.1</span>
                            <span class="w-1 h-1 rounded-full bg-slate-700"></span>
                            <a href="https://github.com/CyberStrategyInstitute/ai-safe2-framework" target="_blank" rel="noreferrer" class="flex items-center gap-1 hover:text-white transition-colors">
                                Github Repository ${icons.external}
                            </a>
                        </div>
                        <div class="text-[10px] text-slate-600 font-mono">
                            BUILD_VER: 2.1.0-STATIC | ${stats.total} CONTROLS
                        </div>
                    </footer>
                </div>
            `;
        }

        // Filter functions
        function setPillarFilter(pillar) {
            filters.pillar = pillar;
            render();
        }

        function updateSearch(query) {
            filters.searchQuery = query;
            render();
        }

        function resetFilters() {
            filters = {
                pillar: 'All',
                riskLevel: 'All',
                isGapFiller: null,
                searchQuery: ''
            };
            render();
        }

        // Initialize
        loadData();
    </script>
</body>
</html>
