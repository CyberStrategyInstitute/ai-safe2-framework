version: 2

updates:
  # Root Python dependencies (existing root pyproject.toml)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps(root-python)"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  # NEXUS protocol Python dependencies
  - package-ecosystem: "pip"
    directory: "/NEXUS"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:15"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
      - "nexus"
    commit-message:
      prefix: "deps(nexus)"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  # Python SDK dependencies
  - package-ecosystem: "pip"
    directory: "/sdk/python"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
      - "sdk"
    commit-message:
      prefix: "deps(python)"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:45"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci(actions)"

  # NEXUS Docker base images
  - package-ecosystem: "docker"
    directory: "/NEXUS/docker"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "06:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
      - "nexus"
    commit-message:
      prefix: "deps(nexus-docker)"