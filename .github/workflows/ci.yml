name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - "sdk/python/**"
      - "opa/**"
      - "schemas/**"
      - "compliance/**"
      - "examples/**"
      - ".github/workflows/ci.yml"
      - "pyproject.toml"
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # Test suite: Python 3.10, 3.11, 3.12
  # --------------------------------------------------------------------------
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install SDK (editable, dev extras)
        run: |
          cd sdk/python
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          cd sdk/python
          python -m pytest tests/ -v --tb=short --cov=nexus_sdk \
            --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: sdk/python/coverage.xml
          retention-days: 7

  # --------------------------------------------------------------------------
  # v0.3 compliance checker
  # --------------------------------------------------------------------------
  compliance:
    name: SAFE2 v3.0 Compliance
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install SDK
        run: |
          cd sdk/python
          pip install -e .

      - name: Run v0.3 compliance checks
        run: |
          cd sdk/python
          PYTHONPATH=. python ../../compliance/scoring/nexus-score.py --v03-checks
          PYTHONPATH=. python ../../compliance/scoring/nexus-score.py --check-env

  # --------------------------------------------------------------------------
  # Lint and formatting
  # --------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff>=0.4.0

      - name: Ruff check
        run: ruff check sdk/python/nexus_sdk/ examples/

      - name: Ruff format check
        run: ruff format --check sdk/python/nexus_sdk/ examples/

  # --------------------------------------------------------------------------
  # Em dash guard -- enforced on every PR
  # --------------------------------------------------------------------------
  em-dash-guard:
    name: No Em Dashes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for em dashes
        run: |
          echo "Scanning for em dashes (U+2014) and en dashes (U+2013)..."
          FOUND=$(grep -rn $'\xe2\x80\x94\|\xe2\x80\x93' \
            --include="*.py" --include="*.md" --include="*.rego" \
            --include="*.toml" --include="*.yaml" --include="*.json" \
            . 2>/dev/null || true)
          if [ -n "$FOUND" ]; then
            echo "ERROR: em/en dashes found. Use colons, semicolons, or parentheses."
            echo "$FOUND"
            exit 1
          fi
          echo "Clean -- no em dashes found."

  # --------------------------------------------------------------------------
  # Run examples (smoke test)
  # --------------------------------------------------------------------------
  examples:
    name: Examples Smoke Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install SDK
        run: |
          cd sdk/python
          pip install -e .

      - name: sovereign_gateway.py
        run: cd sdk/python && PYTHONPATH=. python ../../examples/sovereign_gateway.py

      - name: acs_bridge.py
        run: cd sdk/python && PYTHONPATH=. python ../../examples/acs_bridge.py

      - name: personal_agent.py
        run: cd sdk/python && PYTHONPATH=. python ../../examples/personal_agent.py

  # --------------------------------------------------------------------------
  # Schema validation (JSON schemas are valid JSON)
  # --------------------------------------------------------------------------
  schema-lint:
    name: Schema Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JSON schemas
        run: |
          for f in schemas/*.json; do
            echo "Validating $f..."
            python3 -c "import json; json.load(open('$f'))" && echo "  OK"
          done
